<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>BanVeXe - Đặt vé</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      :root {
        --futa-orange: #ef5222;
      }
      body {
        background-color: #f4f7f6;
        font-size: 14px;
      }
      .card-custom {
        background: white;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        border: none;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }
      .seat {
        width: 40px;
        height: 40px;
        border: 1px solid #ddd;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background: #e3f2fd;
        color: #0060c4;
        margin: 5px;
        font-size: 12px;
      }
      .seat.booked {
        background: #ffe5e5;
        color: #d32f2f;
        cursor: not-allowed;
        border: 1px solid #ef9a9a;
      }
      .seat.held {
        background: #fff8e1;
        color: #f57c00;
        cursor: not-allowed;
        border: 1px solid #ffcc80;
      }
      .seat.selecting {
        background: #fff3f0;
        border: 1px solid var(--futa-orange);
        color: var(--futa-orange);
        font-weight: bold;
      }
      .text-orange {
        color: var(--futa-orange);
      }
      .btn-payment {
        background-color: var(--futa-orange);
        color: white;
        border: none;
        padding: 10px 30px;
        border-radius: 20px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="row">
        <div class="col-lg-8">
          <div class="card-custom">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="fw-bold m-0">Chọn ghế</h5>
              <a href="#" class="text-primary text-decoration-none small"
                >Thông tin xe</a
              >
            </div>
            <div class="row text-center">
              <div class="col-6 border-end">
                <p class="text-muted">Tầng dưới</p>
                <div
                  class="d-flex flex-wrap justify-content-center"
                  id="lower-deck"
                ></div>
              </div>
              <div class="col-6">
                <p class="text-muted">Tầng trên</p>
                <div
                  class="d-flex flex-wrap justify-content-center"
                  id="upper-deck"
                ></div>
              </div>
            </div>
          </div>

          <div class="card-custom">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="fw-bold m-0">Thông tin khách hàng</h5>
              <a href="#" class="text-orange text-decoration-none fw-bold small"
                >ĐIỀU KHOẢN & LƯU Ý</a
              >
            </div>
            <div class="row g-3">
              <div class="col-md-12">
                <label class="form-label fw-bold">Họ và tên *</label>
                <input
                  type="text"
                  id="fullName"
                  class="form-control"
                  placeholder="Nhập họ và tên"
                />
              </div>
              <div class="col-md-12">
                <label class="form-label fw-bold">Số điện thoại *</label>
                <input
                  type="text"
                  id="phone"
                  class="form-control"
                  placeholder="Nhập số điện thoại"
                />
              </div>
              <div class="col-md-12">
                <label class="form-label fw-bold">Email *</label>
                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="Nhập email"
                />
              </div>
              <div class="col-12 mt-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="terms" />
                  <label class="form-check-label small" for="terms">
                    Chấp nhận <a href="#" class="text-orange">điều khoản</a> đặt
                    vé & chính sách bảo mật.
                  </label>
                </div>
              </div>
            </div>
          </div>

          <div class="card-custom">
            <h5 class="fw-bold mb-4">
              Thông tin đón trả <i class="bi bi-info-circle text-orange"></i>
            </h5>
            <div class="row">
              <div class="col-md-6 border-end">
                <p class="fw-bold">ĐIỂM ĐÓN</p>
                <div class="form-check mb-2">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="pick"
                    checked
                  />
                  <label class="form-check-label">Bến xe/VP</label>
                </div>
                <select class="form-select mb-3" id="pickPoint"></select>
              </div>
              <div class="col-md-6 ps-md-4">
                <p class="fw-bold">ĐIỂM TRẢ</p>
                <div class="form-check mb-2">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="drop"
                    checked
                  />
                  <label class="form-check-label">Bến xe/VP</label>
                </div>
                <select class="form-select mb-3" id="dropPoint"></select>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card-custom">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h6 class="fw-bold m-0">Thông tin chuyến đi</h6>
              <a href="#" class="text-orange text-decoration-none small"
                >Chi tiết</a
              >
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Tuyến xe</span>
              <span class="fw-bold" id="route-name">Đang tải...</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Thời gian xuất bến</span>
              <span class="text-success fw-bold">22:40 17/03/2026</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Số lượng ghế</span>
              <span id="seat-count">0 Ghế</span>
            </div>
            <div class="d-flex justify-content-between">
              <span class="text-muted">Số ghế</span>
              <span class="text-orange fw-bold" id="seat-list">Trống</span>
            </div>
            <hr />
            <div class="d-flex justify-content-between align-items-center">
              <span class="fw-bold fs-5">Tổng tiền</span>
              <span class="text-orange fw-bold fs-5" id="total-price">0đ</span>
            </div>
            <div class="mt-4 d-flex justify-content-between">
              <button
                class="btn btn-outline-secondary rounded-pill px-4"
                onclick="history.back()"
              >
                Hủy
              </button>
              <button class="btn btn-payment" onclick="submitBooking()">
                Thanh toán
              </button>
            </div>
            <div id="hold-countdown" class="small text-warning mt-2"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = "/api";
      const urlParams = new URLSearchParams(window.location.search);
      const routeId = urlParams.get("routeId");
      const tripId =
        urlParams.get("tripId") || sessionStorage.getItem("tripId");

      let selectedSeats = [];
      let unavailableSeats = new Set();
      let bookedSeats = new Set();
      let heldSeats = new Set();
      let holdUntilBySeat = {};
      let pricePerSeat = 0; // ✅ FIX: dùng let
      let seatPollTimer = null;
      let countdownTimer = null;

      document.addEventListener("DOMContentLoaded", () => {
        loadRouteInfo();
        loadTripInfo(); // 🔥 load giá vé
        loadSeatAvailability();
        loadUserInfo();
        seatPollTimer = setInterval(loadSeatAvailability, 15000);
        countdownTimer = setInterval(updateHoldCountdown, 1000);
      });

      window.addEventListener("beforeunload", () => {
        if (seatPollTimer) {
          clearInterval(seatPollTimer);
        }
        if (countdownTimer) {
          clearInterval(countdownTimer);
        }
      });

      // =========================
      // 🔥 LOAD TRIP (LẤY GIÁ)
      // =========================
      async function loadTripInfo() {
        const urlParams = new URLSearchParams(window.location.search);
        const tripId = urlParams.get("tripId");

        if (!tripId) {
          console.error("Không tìm thấy tripId trên URL");
          return;
        }

        try {
          // Đảm bảo dùng đúng đường dẫn API
          const res = await fetch(`${API_BASE}/trips/${tripId}`);

          if (!res.ok) {
            console.error("Lỗi server khi lấy thông tin Trip:", res.status);
            return;
          }

          const data = await res.json();
          console.log("Dữ liệu Trip nhận được:", data);

          // FIX: Kiểm tra chính xác tên trường Backend trả về (có thể là price hoặc pricePerTicket)
          pricePerSeat = data.pricePerTicket || data.price || 0;

          // Cập nhật giao diện nếu có thông tin thời gian xuất bến từ DB
          if (data.departureTime) {
            const date = new Date(data.departureTime);
            const timeStr = date.toLocaleTimeString("vi-VN", {
              hour: "2-digit",
              minute: "2-digit",
            });
            const dateStr = date.toLocaleDateString("vi-VN");
            document.querySelector(".text-success.fw-bold").innerText =
              `${timeStr} ${dateStr}`;
          }

          updateSummary(); // Gọi hàm này để tính lại tiền (0 ghế * giá)
        } catch (e) {
          console.error("Lỗi kết nối API Trip:", e);
        }
      }

      // =========================
      // LOAD ROUTE
      // =========================
      async function loadRouteInfo() {
        if (!routeId) return;

        try {
          const res = await fetch(`${API_BASE}/routes/${routeId}`);
          const data = await res.json();

          document.getElementById("route-name").innerText =
            `${data.departureLocation} - ${data.arrivalLocation}`;

          document.getElementById("pickPoint").innerHTML =
            `<option>BX ${data.departureLocation}</option>`;
          document.getElementById("dropPoint").innerHTML =
            `<option>BX ${data.arrivalLocation}</option>`;
        } catch (e) {
          console.error(e);
        }
      }

      // =========================
      // VẼ GHẾ
      // =========================
      function renderSeats() {
        const lower = document.getElementById("lower-deck");
        const upper = document.getElementById("upper-deck");

        let lowerHtml = "";
        let upperHtml = "";

        for (let i = 1; i <= 17; i++) {
          const code = i < 10 ? `0${i}` : i;
          lowerHtml += createSeat("A" + code);
          upperHtml += createSeat("B" + code);
        }

        lower.innerHTML = lowerHtml;
        upper.innerHTML = upperHtml;
      }

      function createSeat(id) {
        const isBooked = bookedSeats.has(id) && !selectedSeats.includes(id);
        const isHeld = heldSeats.has(id) && !selectedSeats.includes(id);
        const isBlocked = isBooked || isHeld;
        let className = "";
        if (isBooked) className = "booked";
        if (isHeld) className = "held";

        return `
      <div class="seat ${className}" 
        id="seat-${id}" 
        onclick="${isBlocked ? "" : `selectSeat('${id}')`}">
        ${id}
      </div>`;
      }

      async function loadSeatAvailability() {
        if (!tripId) return;
        try {
          const res = await fetch(`${API_BASE}/trips/${tripId}/seats/unavailable`, {
            credentials: "same-origin",
          });
          if (!res.ok) return;
          const data = await res.json();
          bookedSeats = new Set(data.bookedSeats || []);
          heldSeats = new Set(data.heldSeats || []);
          unavailableSeats = new Set(data.unavailableSeats || []);
          renderSeats();
          updateSummary();
        } catch (e) {
          console.error("Không tải được trạng thái ghế:", e);
        }
      }

      // =========================
      // CHỌN GHẾ
      // =========================
      async function selectSeat(id) {
        const el = document.getElementById(`seat-${id}`);

        if (selectedSeats.includes(id)) {
          await releaseSeatHold(id);
          selectedSeats = selectedSeats.filter((s) => s !== id);
          delete holdUntilBySeat[id];
          el.classList.remove("selecting");
        } else {
          if (selectedSeats.length >= 5) {
            return alert("Chỉ được chọn tối đa 5 ghế!");
          }
          const holdResult = await holdSeat(id);
          if (!holdResult.success) {
            alert(holdResult.message || "Ghế đang được người khác giữ");
            await loadSeatAvailability();
            return;
          }
          selectedSeats.push(id);
          if (holdResult.holdUntil) {
            holdUntilBySeat[id] = holdResult.holdUntil;
          }
          el.classList.add("selecting");
        }

        updateSummary();
        updateHoldCountdown();
      }

      async function holdSeat(seatNumber) {
        const res = await fetch(`${API_BASE}/trips/${tripId}/seats/hold`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ seatNumber }),
        });
        if (res.status === 401) {
          window.location.href = "/login";
          return { success: false, message: "Bạn cần đăng nhập" };
        }
        const data = await res.json();
        return {
          success: !!data.success,
          message: data.message,
          holdUntil: data.holdUntil,
        };
      }

      async function releaseSeatHold(seatNumber) {
        try {
          await fetch(`${API_BASE}/trips/${tripId}/seats/hold?seatNumber=${encodeURIComponent(seatNumber)}`, {
            method: "DELETE",
            credentials: "same-origin",
          });
        } catch (e) {
          console.warn("Không thể nhả hold ghế:", e);
        }
      }

      function updateHoldCountdown() {
        const holder = document.getElementById("hold-countdown");
        if (!holder) return;
        if (!selectedSeats.length) {
          holder.innerText = "";
          return;
        }

        const now = Date.now();
        const rows = selectedSeats
          .map((seat) => {
            const holdUntil = holdUntilBySeat[seat];
            if (!holdUntil) return null;
            const diff = new Date(holdUntil).getTime() - now;
            if (diff <= 0) return `Ghế ${seat}: hết giữ`;
            const minutes = Math.floor(diff / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            return `Ghế ${seat}: còn ${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
          })
          .filter(Boolean);

        holder.innerText = rows.length ? rows.join(" | ") : "";
      }

      // =========================
      // CẬP NHẬT GIÁ
      // =========================
      function updateSummary() {
        document.getElementById("seat-count").innerText =
          selectedSeats.length + " Ghế";

        document.getElementById("seat-list").innerText =
          selectedSeats.length > 0 ? selectedSeats.join(", ") : "Trống";

        document.getElementById("total-price").innerText =
          (selectedSeats.length * pricePerSeat).toLocaleString() + "đ";
      }

      // =========================
      // LOAD USER
      // =========================
      function loadUserInfo() {
        const userData = localStorage.getItem("user");
        if (userData && userData !== "undefined") {
          const user = JSON.parse(userData);
          // Tiến hành đổ dữ liệu vào Form (Họ tên, Email, SĐT)
        } else {
          console.warn("Chưa có thông tin người dùng trong storage.");
        }
      }

      // =========================
      // SUBMIT BOOKING
      // =========================
      async function submitBooking() {
        const name = document.getElementById("fullName").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const email = document.getElementById("email").value.trim();
        if (selectedSeats.length === 0) return alert("Vui lòng chọn ghế!");

        // Kiểm tra thông tin tự nhập
        if (!name || !phone || !email) {
          return alert("Vui lòng nhập đầy đủ thông tin khách hàng!");
        }

        if (!document.getElementById("terms").checked) {
          return alert("Bạn phải đồng ý với điều khoản!");
        }

        // Xác thực bằng session thật từ server thay vì localStorage
        let me;
        try {
          const meRes = await fetch("/api/auth/me", { credentials: "same-origin" });
          if (!meRes.ok) {
            alert("Vui lòng đăng nhập để đặt vé!");
            window.location.href = "/login";
            return;
          }
          me = await meRes.json();
        } catch (e) {
          console.error("Không thể kiểm tra trạng thái đăng nhập:", e);
          alert("Vui lòng đăng nhập để đặt vé!");
          window.location.href = "/login";
          return;
        }

        const routeName = document.getElementById("route-name").innerText;

        const bookingData = {
          tripId: tripId,
          userId: me.id,
          seats: selectedSeats,
          customerName: name,
          customerPhone: phone,
          customerEmail: email,
          routeName: routeName,
          totalAmount: selectedSeats.length * pricePerSeat,
        };

        // Lưu vào sessionStorage để trang /payment có thể lấy ra dùng
        sessionStorage.setItem("pendingBooking", JSON.stringify(bookingData));
        window.location.href = "/payment";
      }
    </script>
  </body>
</html>
